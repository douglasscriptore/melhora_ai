<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Melhora.AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1e293b;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #e2e8f0;
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header h1 { font-size: 15px; font-weight: 600; color: #0f172a; }
    .header p  { font-size: 11px; color: #64748b; margin-top: 1px; }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    label { display: flex; flex-direction: column; gap: 5px; }
    label span { font-size: 11.5px; font-weight: 500; color: #475569; }

    select, input[type="password"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input[type="password"]:focus {
      border-color: #6366f1;
      background: #fff;
    }

    .row { display: flex; gap: 8px; }
    .row label { flex: 1; }

    button {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:active { opacity: 0.8; }

    .notice {
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 11.5px;
      line-height: 1.5;
    }
    .notice.ok    { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .notice.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .notice.info  { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #e2e8f0;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">M</div>
    <div>
      <h1>Melhora.AI</h1>
      <p>Configurações da extensão</p>
    </div>
  </div>

  <div class="body">
    <div class="row">
      <label>
        <span>Provider</span>
        <select id="provider">
          <option value="openai">OpenAI</option>
          <option value="claude">Anthropic (Claude)</option>
          <option value="groq">Groq</option>
          <option value="openrouter">OpenRouter</option>
          <option value="gemini">Google Gemini</option>
        </select>
      </label>
      <label>
        <span>Modelo</span>
        <select id="model"></select>
      </label>
    </div>

    <label>
      <span>Chave de API</span>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" />
    </label>

    <button id="save">Salvar configurações</button>

    <div id="notice" class="notice info" style="display:none"></div>
  </div>

  <div class="footer">Foque em qualquer campo de texto para ver o widget</div>

  <script src="popup.js"></script>
</body>
</html>
